  document.getElementById("search").addEventListener("keyup", async function(event) {
      // search through data_json and display the results
        const input_search_term = document.getElementById("search").value;
        const results = document.getElementById("results");
        results.innerHTML = "";
        if (input_search_term.includes("|"))
        {
            const search_terms = input_search_term.split("|");
            for (const search_term of search_terms)
            {
                // for (const [item, location] of data_json)
                data_json.forEach(data => {
                    if (data.item.includes(search_term))
                    {
                      results.innerHTML += `<li>${data.item} is in ${data.location}</li>`;
                    }
                });
            }
        }
        else if (input_search_term.includes("&"))
        {
          // https://stackoverflow.com/questions/15201939/jquery-javascript-check-string-for-multiple-substrings
          const search_terms = search_term.split("&");
          // for (const [key, value] of Object.entries(data_json))
          // for (const [item, location] of data_json)
          data_json.forEach(data => {
                    if (search_terms.every(term => data.item.includes(search_terms)))
                    {
                      results.innerHTML += `<li>${data.item} is in ${data.location}</li>`;
                    }
                    
                });
        }
        else if (input_search_term.length > 0)
        {
          // for (const [key, value] of Object.entries(data_json)) {
            // for (const [item, location] of data_json)
            data_json.forEach(data => {
              // console.log(data.item);
                if (data.item.toLowerCase().includes(input_search_term.toLowerCase()))
                {
                  results.innerHTML += `<li>${data.item} is in ${data.location}</li>`;
                }
            });
        }
        else
        {
            results.innerHTML += `<li>Displaying all items</li>`;
            // for (const [key, value] of Object.entries(data_json)) {
            //   results.innerHTML += `<li>${key} is in ${value}</li>`;
            // }

            data_json.forEach(data => {
                results.innerHTML += `<li>${data.item} is in ${data.location}</li>`;
            });
        }
        
      
  });
